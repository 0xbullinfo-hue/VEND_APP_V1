# Project-wide Gradle settings.

# Specifies the JVM arguments used for the daemon process.
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m --add-opens java.base/java.nio.channels=ALL-UNNAMED --add-opens java.base/sun.nio.ch=ALL-UNNAMED

# AndroidX package structure
android.useAndroidX=true
android.enableJetifier=true

# Version of flipper SDK
FLIPPER_VERSION=0.250.0

# Use this property to specify which architecture you want to build.
reactNativeArchitectures=armeabi-v7a,arm64-v8a,x86,x86_64

# Support for the new architecture.
newArchEnabled=false

# Android SDK versions override
android.minSdkVersion=24
android.targetSdkVersion=34
android.compileSdkVersion=34
android.buildToolsVersion=34.0.0

# The hosted JavaScript engine
expo.jsEngine=hermes

# Enable GIF/WebP support
expo.gif.enabled=true
expo.webp.enabled=true
expo.webp.animated=false

# Disable extra opens warnings
android.suppressUnsupportedCompileSdk=34

# 16KB Page Size Support (RN 0.75+)
android.useLegacyPackaging=false
android.extractNativeLibs=false
